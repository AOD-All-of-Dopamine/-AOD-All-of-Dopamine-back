# src/main/resources/application.properties

# ?? ??
spring.application.name=AOD
server.port=8080

# DB (???? ??)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aodDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true

# API Keys (???? ?? - ??? ??)
tmdb.api.key=${TMDB_API_KEY}
openai.api.key=${OPENAI_API_KEY}

# Naver (?????)
naver.id=${NAVER_ID}
naver.pw=${NAVER_PW}

# Netflix (?????)
netflix.id=${NETFLIX_ID}
netflix.pw=${NETFLIX_PW}

# ?? ??
recommendation.traditional.max-items-per-category=10
recommendation.llm.max-tokens=1500