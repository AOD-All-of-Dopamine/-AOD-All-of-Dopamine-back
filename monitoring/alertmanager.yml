# ============================================================================
# AOD Backend — Alertmanager configuration
# ----------------------------------------------------------------------------
# Slack delivery is a TEMPLATE driven by the ${SLACK_WEBHOOK_URL} env var.
#
#   REQUIRED to actually send to Slack:
#     1) Run Alertmanager with env expansion:
#          alertmanager --config.file=/etc/alertmanager/alertmanager.yml \
#                       --config.expand-env=true
#     2) Export the webhook in the alertmanager compose service, e.g.:
#          environment:
#            - SLACK_WEBHOOK_URL=https://hooks.slack.com/services/XXX/YYY/ZZZ
#
#   If SLACK_WEBHOOK_URL is NOT set, expand-env substitutes an empty string
#   and Slack pushes will fail/no-op — but alerts STILL group correctly and
#   remain visible in the Alertmanager web UI (http://alertmanager:9093).
#
#   NEVER hardcode a real webhook in this file (it is in version control).
# ============================================================================

global:
  resolve_timeout: 5m

# ----------------------------------------------------------------------------
# Routing tree
# ----------------------------------------------------------------------------
route:
  # Group alerts by alertname + job so api and crawler notifications stay
  # separate, and a burst of the same alert collapses into one notification.
  group_by: ['alertname', 'job']
  group_wait: 30s        # wait 30s for more alerts of a new group before firing
  group_interval: 5m     # wait 5m before adding new alerts to an existing group
  repeat_interval: 4h    # re-send an unresolved group at most every 4h
  receiver: 'default'    # catch-all receiver

  routes:
    # Critical alerts get their own (faster-repeating) branch but reuse Slack.
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h

# ----------------------------------------------------------------------------
# Receivers
# ----------------------------------------------------------------------------
receivers:
  # Default catch-all. Also points at Slack so warnings are delivered; if the
  # webhook env var is unset this is effectively a no-op (alerts still group).
  - name: 'default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#aod-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.job }})'
        text: >-
          {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* — {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#aod-alerts'
        send_resolved: true
        title: ':rotating_light: [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.job }})'
        text: >-
          {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* — {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

# ----------------------------------------------------------------------------
# Inhibition: when a CRITICAL alert is firing, suppress the matching WARNING
# for the same alertname+job (e.g. HighHeapUsage critical mutes its warning).
# ----------------------------------------------------------------------------
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'job']
