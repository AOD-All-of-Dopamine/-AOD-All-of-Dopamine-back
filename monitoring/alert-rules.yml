# ============================================================================
# AOD Backend — Consolidated Prometheus Alerting Rules
# ----------------------------------------------------------------------------
# Replaces the old alert-rules.yml and alert-rules-crawler.yml.
# ALL series are filtered by the Prometheus `job` label ("api" | "crawler"),
# NEVER by the Micrometer `application` tag (it is inconsistent across apps).
# Every metric referenced here is actually emitted by the apps — no phantoms.
#
# Wire into prometheus.yml:
#   rule_files:
#     - alert-rules.yml
# ============================================================================

groups:

  # ==========================================================================
  # availability — is each app's /actuator/prometheus being scraped & up?
  # ==========================================================================
  - name: availability
    rules:
      - alert: ServiceDown
        expr: up{job=~"api|crawler"} == 0
        for: 2m
        labels:
          severity: critical
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "Service down: {{ $labels.job }}"
          description: "Prometheus target {{ $labels.job }} ({{ $labels.instance }}) has been unreachable (up == 0) for more than 2 minutes."

  # ==========================================================================
  # resources — per-app JVM / CPU / threads / GC. The `job` label is carried
  # through every expression so {{ $labels.job }} resolves per app.
  # ==========================================================================
  - name: resources
    rules:
      # Heap usage > 90% — warning. Summed per (job) across heap pools so the
      # ratio reflects total heap, not a single id (e.g. Eden vs Old Gen).
      - alert: HighHeapUsage
        expr: |
          sum by (job) (jvm_memory_used_bytes{area="heap"})
            /
          sum by (job) (jvm_memory_max_bytes{area="heap"})
            > 0.90
        for: 5m
        labels:
          severity: warning
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "High heap usage on {{ $labels.job }} ({{ $value | humanizePercentage }})"
          description: "{{ $labels.job }} JVM heap usage has been above 90% for 5m (current: {{ $value | humanizePercentage }})."

      # Heap usage > 95% — critical (inhibits the warning above via Alertmanager).
      - alert: HighHeapUsage
        expr: |
          sum by (job) (jvm_memory_used_bytes{area="heap"})
            /
          sum by (job) (jvm_memory_max_bytes{area="heap"})
            > 0.95
        for: 5m
        labels:
          severity: critical
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "Critical heap usage on {{ $labels.job }} ({{ $value | humanizePercentage }})"
          description: "{{ $labels.job }} JVM heap usage has been above 95% for 5m (current: {{ $value | humanizePercentage }}). OutOfMemory risk."

      # System CPU saturation > 85% (system_cpu_usage is 0..1).
      - alert: HighCPU
        expr: system_cpu_usage{job=~"api|crawler"} > 0.85
        for: 5m
        labels:
          severity: warning
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "High CPU on {{ $labels.job }} ({{ $value | humanizePercentage }})"
          description: "{{ $labels.job }} system CPU usage has been above 85% for 5m (current: {{ $value | humanizePercentage }})."

      # Live thread count runaway (note the _threads suffix on the metric name).
      - alert: HighThreadCount
        expr: jvm_threads_live_threads{job=~"api|crawler"} > 200
        for: 5m
        labels:
          severity: warning
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "High thread count on {{ $labels.job }} ({{ $value }} threads)"
          description: "{{ $labels.job }} has had more than 200 live JVM threads for 5m (current: {{ $value }}). Possible thread leak or pool misconfiguration."

      # GC pause pressure: > 0.5s of pause accumulated per second over 5m.
      - alert: LongGCPause
        expr: rate(jvm_gc_pause_seconds_sum{job=~"api|crawler"}[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "Long GC pauses on {{ $labels.job }} ({{ $value | humanizeDuration }}/s)"
          description: "{{ $labels.job }} is spending more than 0.5s/s in GC pauses over 5m (current: {{ $value }}). The JVM is GC-bound."

  # ==========================================================================
  # http — request error rate & latency. API app only (job="api").
  # ==========================================================================
  - name: http
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="api",status=~"5.."}[5m]))
            /
          sum(rate(http_server_requests_seconds_count{job="api"}[5m]))
            > 0.05
        for: 5m
        labels:
          severity: critical
          app: api
          job: api
        annotations:
          summary: "High 5xx error rate on api ({{ $value | humanizePercentage }})"
          description: "More than 5% of api HTTP responses have been 5xx for 5m (current: {{ $value | humanizePercentage }})."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{job="api"}[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          app: api
          job: api
        annotations:
          summary: "High p95 latency on api ({{ $value }}s)"
          description: "api request p95 latency has been above 2s for 5m (current: {{ $value }}s)."

  # ==========================================================================
  # db — HikariCP connection pool. NOTE: crawler pool max is 5, so 0.9 means
  # ~4.5 of 5 connections busy. No {quantile=...} selectors on hikari metrics.
  # ==========================================================================
  - name: db
    rules:
      - alert: HikariPoolExhaustion
        expr: |
          hikaricp_connections_active{job=~"api|crawler"}
            /
          hikaricp_connections_max{job=~"api|crawler"}
            > 0.9
        for: 3m
        labels:
          severity: warning
          app: "{{ $labels.job }}"
          job: "{{ $labels.job }}"
        annotations:
          summary: "Hikari pool near exhaustion on {{ $labels.job }} pool={{ $labels.pool }} ({{ $value | humanizePercentage }})"
          description: "{{ $labels.job }} HikariCP pool '{{ $labels.pool }}' has been above 90% active for 3m (current: {{ $value | humanizePercentage }}). Connections may start queueing/timeouts."

  # ==========================================================================
  # crawler-jobs — custom queue metrics, job="crawler" ONLY.
  # status values come from JobStatus enum: PENDING/PROCESSING/COMPLETED/RETRY/FAILED/SKIPPED.
  # ==========================================================================
  - name: crawler-jobs
    rules:
      - alert: CrawlJobBacklog
        expr: sum(crawl_job_queue_size{job="crawler",status="PENDING"}) > 1000
        for: 10m
        labels:
          severity: warning
          app: crawler
          job: crawler
        annotations:
          summary: "Crawl job backlog building up ({{ $value }} PENDING)"
          description: "More than 1000 crawl jobs have been in PENDING status for 10m (current: {{ $value }}). The consumer is not keeping up with the producer."

      # Error ratio per the CONTRACT formula: failed / (completed + failed),
      # clamped so a quiet period (no completions) does not divide by zero.
      - alert: HighCrawlJobFailureRate
        expr: |
          sum(rate(crawl_job_failed_total{job="crawler"}[10m]))
            /
          clamp_min(
            sum(rate(crawl_job_completed_total{job="crawler"}[10m]))
              + sum(rate(crawl_job_failed_total{job="crawler"}[10m])),
            1
          ) > 0.30
        for: 10m
        labels:
          severity: critical
          app: crawler
          job: crawler
        annotations:
          summary: "High crawl job failure rate ({{ $value | humanizePercentage }})"
          description: "More than 30% of crawl jobs have been failing for 10m (current: {{ $value | humanizePercentage }})."

      # Throughput stalled: no jobs completing over 15m WHILE work is queued.
      - alert: CrawlJobStalled
        expr: |
          sum(rate(crawl_job_completed_total{job="crawler"}[15m])) == 0
            and
          sum(crawl_job_queue_size{job="crawler",status="PENDING"}) > 0
        for: 15m
        labels:
          severity: critical
          app: crawler
          job: crawler
        annotations:
          summary: "Crawl consumer stalled (0 completions, {{ $value }} pending)"
          description: "No crawl jobs have completed in 15m while PENDING jobs remain queued. The consumer scheduler appears stuck."
