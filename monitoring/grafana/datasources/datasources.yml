apiVersion: 1

# Grafana datasource provisioning (mounted at
# /etc/grafana/provisioning/datasources). Fixed uids so dashboards and
# the Loki explore links can reference them deterministically.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
