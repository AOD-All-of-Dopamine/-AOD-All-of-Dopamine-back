apiVersion: 1

# Grafana dashboard provider. Loads every dashboard JSON found under the
# provisioning dashboards path; foldersFromFilesStructure mirrors the
# on-disk subdirectory layout into Grafana folders.
providers:
  - name: 'AOD Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
